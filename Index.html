<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пж o(*°▽°*)o</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0a2f1d, #144d29, #1b5e3a, #0f3d22);
            background-size: 400% 400%;
            animation: gradientBg 10s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            padding: 30px;
            max-width: 90%;
            width: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .kaomoji {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 20px;
            color: #a3f7bf;
            text-shadow: 0 2px 10px rgba(163, 247, 191, 0.4);
        }

        p {
            font-size: 1.4rem;
            margin: 0 0 25px 0;
            color: #e0e0e0;
        }

        .hardware {
            color: #5effa3;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(94, 255, 163, 0.3);
        }

        /* Блок прогресу збору */
        .progress-container {
            margin-bottom: 25px;
            text-align: center;
        }

        .progress-text {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffd166;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 16px;
            width: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #5effa3, #06d6a0);
            height: 100%;
            width: 20.45%; 
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(94, 255, 163, 0.5);
        }

        /* Погрожувальний блок таймера */
        .countdown-container {
            margin-bottom: 35px;
            background: rgba(255, 0, 0, 0.15);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff3b30;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.2);
        }

        .countdown-title {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff4d4d;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }

        #timer {
            font-size: 1.6rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 10px #ff3b30, 0 0 20px #ff3b30;
            letter-spacing: 2px;
        }

        /* Кнопка Монобанку */
        .mono-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #111111;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            border: 2px solid #ff3b30;
            box-shadow: 0 4px 20px rgba(255, 59, 48, 0.4);
            transition: transform 0.1s ease, background-color 0.3s, box-shadow 0.3s;
        }

        /* Скажене дрижання при наведенні */
        .mono-btn:hover {
            background-color: #ff3b30;
            box-shadow: 0 8px 25px rgba(255, 59, 48, 0.7);
            animation: shakeBtn 0.15s infinite linear;
        }

        .mono-btn:active {
            transform: scale(0.98);
        }

        @keyframes shakeBtn {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>пж</h1>
        <span class="kaomoji">o(*°▽°*)o</span>
        <p>на <span class="hardware">Gigabyte 650W 80+ Silver</span></p>
        
        <!-- Блок із прогресом -->
        <div class="progress-container">
            <div class="progress-text">Зібрано: 450 / 2200 ₴</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Погрожувальний блок таймера -->
        <div class="countdown-container">
            <div class="countdown-title">У тебе залишилось 4 дні. Час пішов...</div>
            <div id="timer">04д : 00г : 00х : 00с</div>
        </div>
        
        <!-- Замініть посилання в href на ваше справжнє посилання на Банку -->
        <a href="https://send.monobank.ua/jar/5d7EWWKobi" class="mono-btn" target="_blank">
            Закинути на Банку 🐾
        </a>
    </div>

    <script>
        // Жорстко ставимо таймер на 4 дні (96 годин) від моменту запуску сторінки сторінки
        let targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 4); 

        function updateTimer() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.getElementById("timer").innerHTML = "ЧАС ВИЙШОВ. 💀";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            const d = days < 10 ? "0" + days : days;
            const h = hours < 10 ? "0" + hours : hours;
            const m = minutes < 10 ? "0" + minutes : minutes;
            const s = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("timer").innerHTML = `${d}д : ${h}г : ${m}х : ${s}с`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
